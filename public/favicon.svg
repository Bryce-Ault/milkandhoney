  <path d="M32 14 Q30 10 32 6 Q34 2 32 0" stroke="#d4a96a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M40 14 Q38 10 40 6 Q42 2 40 0" stroke="#d4a96a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85"/>

